<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />

    <title>Marcos da Rocha Oliveira Advogados</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;800&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              'firm-blue': '#0f2548',
              'firm-gold': '#ddaf59',
              'firm-gold-light': '#ebd6aa',
              'firm-dark': '#0a1a33',
            },
            fontFamily: {
              serif: ['Cinzel', 'serif'],
              sans: ['Lato', 'sans-serif'],
            }
          }
        }
      }
    </script>
    <style>
      html {
        scroll-behavior: smooth;
        scroll-padding-top: 100px; /* Compensação para o header fixo */
      }
      /* Custom scrollbar for webkit */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #0f2548; 
      }
      ::-webkit-scrollbar-thumb {
        background: #ddaf59; 
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #ebd6aa; 
      }

      /* Reveal Animation Classes */
      .reveal {
        opacity: 0;
        transform: translateY(50px);
        transition: all 1s ease-in-out;
      }

      .reveal.active {
        opacity: 1;
        transform: translateY(0);
      }
    </style>
